stages:
  - test
  - package
  - docker-build

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  IMAGE_NAME: "core-banking-system:$CI_COMMIT_SHORT_SHA"

cache:
  paths:
    - .m2/repository

test:
  stage: test
  image: maven:3.9.9-eclipse-temurin-21
  script:
    - mvn clean verify

package:
  stage: package
  image: maven:3.9.9-eclipse-temurin-21
  script:
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - api/target/api.jar
    expire_in: 1 day
  needs:
    - test

docker-build:
  stage: docker-build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -f api/Dockerfile -t "$IMAGE_NAME" api
  needs:
    - package